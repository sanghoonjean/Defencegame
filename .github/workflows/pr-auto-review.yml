name: PR Auto Review

on:
  pull_request_target:
    types: [opened, reopened, ready_for_review, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  auto-review:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - name: Auto request reviewers
        uses: actions/github-script@v7
        env:
          REVIEWERS: ${{ vars.PR_AUTO_REVIEWERS }}
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pull_number = context.payload.pull_request.number;

            const configured = (process.env.REVIEWERS || '')
              .split(',')
              .map((name) => name.trim())
              .filter(Boolean);

            if (configured.length === 0) {
              core.info('PR_AUTO_REVIEWERS repository variable is empty. Skip requesting reviewers.');
              return;
            }

            const { data: requested } = await github.rest.pulls.listRequestedReviewers({
              owner,
              repo,
              pull_number,
            });

            const alreadyRequested = new Set(requested.users.map((user) => user.login));
            const reviewers = configured.filter((login) => !alreadyRequested.has(login));

            if (reviewers.length === 0) {
              core.info('All configured reviewers are already requested.');
              return;
            }

            await github.rest.pulls.requestReviewers({
              owner,
              repo,
              pull_number,
              reviewers,
            });

            core.info(`Requested reviewers: ${reviewers.join(', ')}`);

      - name: Add automated review summary
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pull_number = context.payload.pull_request.number;
            const headSha = context.payload.pull_request.head.sha;

            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner,
              repo,
              pull_number,
              per_page: 100,
            });

            const fileCount = files.length;
            const additions = files.reduce((sum, file) => sum + (file.additions || 0), 0);
            const deletions = files.reduce((sum, file) => sum + (file.deletions || 0), 0);

            const body = [
              '자동 리뷰 요약입니다. 👀',
              '',
              `- 대상 커밋: \`${headSha.slice(0, 7)}\``,
              `- 변경 파일 수: **${fileCount}**`,
              `- 추가 라인 수: **${additions}**`,
              `- 삭제 라인 수: **${deletions}**`,
            ].join('\n');

            await github.rest.pulls.createReview({
              owner,
              repo,
              pull_number,
              commit_id: headSha,
              event: 'COMMENT',
              body,
            });
