name: Codex Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  codex-review:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Codex Review
        uses: openai/codex-action@main
        with:
          prompt: |
            Review this pull request.

            Focus on:
            - bugs
            - architecture
            - performance
            - maintainability
            - test coverage
            - game logic stability
            - memory leaks
            - null safety
